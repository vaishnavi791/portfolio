<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Portal - Blog & Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-form { max-width: 500px; margin: 40px auto; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 4px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; font-family: 'Times New Roman', serif; border: 1px solid var(--border-color); background: transparent; color: var(--text-color); border-radius: 4px; }
        .submit-btn { background: var(--text-color); color: var(--bg-color); border: none; padding: 10px 15px; cursor: pointer; font-family: 'Times New Roman', serif; border-radius: 4px; }
        .hidden { display: none; }
        .blog-card { padding: 15px; border: 1px solid var(--border-color); margin-bottom: 15px; text-align: left; }
        .blog-date { font-size: 0.85rem; opacity: 0.7; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Section 1: Gatekeeper Entry-->
        <div id="auth-box" class="admin-form">
            <h2>Blog Portal</h2>
            <p style="font-size: 0.9rem; margin-bottom: 15px; opacity: 0.8;">
                Readers: Enter email only to view blogs.
            </p>
            <div class="form-group">
                <label for="portal-email">Email Address</label>
                <input type="email" id="portal-email" placeholder="name@example.com">
            </div>
            <div class="form-group" id="pass-group">
                <label for="portal-password">Password (Admins Only)</label>
                <input type="password" id="portal-password" placeholder="Leave blank if you are a reader">
            </div>
            <button id="btn-enter" class="submit-btn">Continue &rarr;</button>
            <p style="margin-top: 15px;"><a href="index.html">&larr; back</a></p>
        </div>

        <!-- Section 2: Reader Feed Box -->
        <div id="reader-box" class="admin-form hidden">
            <h2>Recent Publications</h2>
            <div id="portal-feed-container">Loading articles...</div>
            <button onclick="window.location.reload()" class="submit-btn" style="margin-top: 15px;">Exit Session</button>
        </div>

        <!-- Section 3: Admin Composer -->
        <div id="editor-box" class="admin-form hidden">
            <h2>Publish New Thought</h2>
            <div class="form-group">
                <label for="post-title">Give it a title</label>
                <input type="text" id="post-title" placeholder="e.g., Optimizing my CNN architecture">
            </div>
            <div class="form-group">
                <label for="post-excerpt">Express your views/thoughts!</label>
                <textarea id="post-excerpt" rows="4" placeholder="Brief preview summary..."></textarea>
            </div>
            <div class="form-group">
                <label for="post-url">Article Link</label>
                <input type="url" id="post-url" placeholder="https://github.com/...">
            </div>
            <button id="btn-publish" class="submit-btn">Publish</button>
            <button id="btn-logout" style="background:none; border:none; text-decoration:underline; margin-left:10px; cursor:pointer;" class="toggle-btn">Logout</button>
        </div>
    </div>

    <script>
    const SUPABASE_URL = "https://pdgvvwyecssxghjmrdwl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZ3Z2d3llY3NzeGdoam1yZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODUwNTYsImV4cCI6MjA5OTk2MTA1Nn0.5uPdCEoWmAC9CEmCzHJhg64_JvO2jo0vR4MCUAsrIuw";
    
    let supabaseClient; 
    try {
        const supabaseSDK = window.supabase || window.Supabase;
        supabaseClient = supabaseSDK.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("Supabase initialized successfully.");
    } catch (err) {
        alert("CRITICAL ERROR: Supabase failed to load. Check your internet connection or script tag. Details: " + err.message);
    }

    const authBox = document.getElementById('auth-box');
    const readerBox = document.getElementById('reader-box');
    const editorBox = document.getElementById('editor-box');

    document.getElementById('btn-enter').addEventListener('click', async (e) => {
        e.preventDefault();
        console.log("Button clicked!");

        const email = document.getElementById('portal-email').value.trim();
        const password = document.getElementById('portal-password').value;

        if (!email) {
            alert("Please type in an email address.");
            return;
        }

        if (!password || password.trim() === "") {
            authBox.classList.add('hidden');
            readerBox.classList.remove('hidden');
            await fetchPortalBlogs();
            return;
        }

        console.log("Attempting login for:", email);
        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                alert("Authentication Failure: " + error.message);
            } else {
                console.log("Login successful! Data:", data);
                authBox.classList.add('hidden');
                editorBox.classList.remove('hidden');
            }
        } catch (err) {
            alert("Runtime Login Execution Error: " + err.message);
        }
    });

    async function fetchPortalBlogs() {
        const feedContainer = document.getElementById('portal-feed-container');
        try {
            const { data: blogs, error } = await supabaseClient
                .from('blogs')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                feedContainer.innerHTML = "<p>Could not load contents: " + error.message + "</p>";
                return;
            }

            if (!blogs || blogs.length === 0) {
                feedContainer.innerHTML = "<p>No blogs published yet. The database is empty!</p>";
                return;
            }

            feedContainer.innerHTML = blogs.map(post => {
                const date = new Date(post.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                return `
                    <div class="blog-card">
                        <span class="blog-date">${date}</span>
                        <h3>${post.title}</h3>
                        <p>${post.excerpt}</p>
                        <a href="${post.link_url}" target="_blank" rel="noopener" class="read-more">Article Links &rarr;</a>
                    </div>
                `;
            }).join('');
        } catch (err) {
            feedContainer.innerHTML = "<p>Fetch runtime error: " + err.message + "</p>";
        }
    }

    document.getElementById('btn-publish').addEventListener('click', async (e) => {
        e.preventDefault();
        const title = document.getElementById('post-title').value.trim();
        const excerpt = document.getElementById('post-excerpt').value.trim();
        const link_url = document.getElementById('post-url').value.trim();

        if (!title || !excerpt || !link_url) {
            alert("All composition parameters are required.");
            return;
        }

        const { error } = await supabaseClient.from('blogs').insert([{ title, excerpt, link_url }]);

        if (error) {
            alert("Database insertion rejected: " + error.message);
        } else {
            alert("Article successfully written live to Postgres!");
            document.getElementById('post-title').value = '';
            document.getElementById('post-excerpt').value = '';
            document.getElementById('post-url').value = '';
        }
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        window.location.reload();
    });
    </script>
</body>
</html>
